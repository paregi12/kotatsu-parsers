name: Test MangaPark Parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/main/kotlin/org/koitharu/kotatsu/parsers/site/all/MangaPark.kt'
      - 'src/test/kotlin/org/koitharu/kotatsu/parsers/MangaParkReproductionTest.kt'
      - '.github/workflows/test-mangapark.yml'

permissions:
  contents: read

jobs:
  test-mangapark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 🌏
        uses: actions/checkout@v4

      - name: Set up environment 🔧
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle 📦
        uses: gradle/actions/setup-gradle@v4

      - name: Run MangaPark Tests 🚀
        run: ./gradlew test --tests "org.koitharu.kotatsu.parsers.MangaParkReproductionTest" --info
